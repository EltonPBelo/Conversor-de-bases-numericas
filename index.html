<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Bases Numéricas</title>
    <!-- Aqui conectamos o arquivo CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="converter-card">
        <h2>Conversor de Bases</h2>
        
        <div class="input-group">
            <label for="dec">Decimal (Base 10)</label>
            <input type="text" id="dec" placeholder="Ex: 255" autocomplete="off">
            <div class="error-msg" id="err-dec">Apenas números de 0 a 9 permitidos.</div>
        </div>

        <div class="input-group">
            <label for="bin">Binário (Base 2)</label>
            <input type="text" id="bin" placeholder="Ex: 11111111" autocomplete="off">
            <div class="error-msg" id="err-bin">Apenas números 0 e 1 permitidos.</div>
        </div>

        <div class="input-group">
            <label for="oct">Octal (Base 8)</label>
            <input type="text" id="oct" placeholder="Ex: 377" autocomplete="off">
            <div class="error-msg" id="err-oct">Apenas números de 0 a 7 permitidos.</div>
        </div>

        <div class="input-group">
            <label for="hex">Hexadecimal (Base 16)</label>
            <input type="text" id="hex" placeholder="Ex: FF" autocomplete="off">
            <div class="error-msg" id="err-hex">Apenas números (0-9) e letras (A-F) permitidos.</div>
        </div>
    </div>

    <!-- Aqui conectamos o arquivo JavaScript externo -->
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Bases Numéricas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="converter-card">
        <h2>🌀 Conversor de Bases</h2>
        <p class="subtitle">Digite em qualquer campo para converter em tempo real</p>

        <!-- Decimal -->
        <div class="input-group">
            <div class="label-row">
                <label for="dec"><span class="badge badge-dec">DEC</span> Decimal (Base 10)</label>
                <button class="btn-copy" onclick="copyToClipboard('dec')" title="Copiar">📋</button>
            </div>
            <input type="text" id="dec" placeholder="Ex: 42" autocomplete="off">
            <div class="error-msg" id="err-dec">⚠️ Digite apenas números de 0 a 9</div>
        </div>

        <!-- Binário -->
        <div class="input-group">
            <div class="label-row">
                <label for="bin"><span class="badge badge-bin">BIN</span> Binário (Base 2)</label>
                <button class="btn-copy" onclick="copyToClipboard('bin')" title="Copiar">📋</button>
            </div>
            <input type="text" id="bin" placeholder="Ex: 101010" autocomplete="off">
            <div class="error-msg" id="err-bin">⚠️ Digite apenas 0 ou 1</div>
        </div>

        <!-- Octal -->
        <div class="input-group">
            <div class="label-row">
                <label for="oct"><span class="badge badge-oct">OCT</span> Octal (Base 8)</label>
                <button class="btn-copy" onclick="copyToClipboard('oct')" title="Copiar">📋</button>
            </div>
            <input type="text" id="oct" placeholder="Ex: 52" autocomplete="off">
            <div class="error-msg" id="err-oct">⚠️ Digite apenas números de 0 a 7</div>
        </div>

        <!-- Hexadecimal -->
        <div class="input-group">
            <div class="label-row">
                <label for="hex"><span class="badge badge-hex">HEX</span> Hexadecimal (Base 16)</label>
                <button class="btn-copy" onclick="copyToClipboard('hex')" title="Copiar">📋</button>
            </div>
            <input type="text" id="hex" placeholder="Ex: 2A" autocomplete="off">
            <div class="error-msg" id="err-hex">⚠️ Digite caracteres válidos (0-9, A-F)</div>
        </div>

        <button id="btn-clear" onclick="clearAll()">Limpar Campos</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
